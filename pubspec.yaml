name: tracker_app
description: Sistema de rastreamento de localização em tempo real.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Serviço em primeiro plano (mantém o app ativo em segundo plano)
  flutter_foreground_task: ^6.1.1

  # Localização do dispositivo
  geolocator: ^11.0.0

  # Gerenciar permissões em runtime
  permission_handler: ^12.0.1

  # Firebase - envio de dados para a nuvem
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

  # Formatação de data/hora
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
